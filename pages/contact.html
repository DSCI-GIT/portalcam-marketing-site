<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — PortalCam Marketing</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <header class="section alt">
    <div class="container">
      <h1>Contact</h1>
      <p>Placeholder contact page. Form wiring is TODO.</p>
      <div class="cta-row" style="justify-content:flex-start;">
        <a class="btn primary" href="../index.html">Home</a>
        <a class="btn" href="pricing.html">Pricing</a>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="card">
        <h3>Send a message</h3>
        <p style="margin-bottom:12px;">TODO: connect form (Netlify Forms / Formspree / etc.)</p>
        <form>
          <div style="display:grid; gap:10px; grid-template-columns: 1fr 1fr;">
            <input required placeholder="Name" style="padding:12px;border-radius:12px;border:1px solid #e7e7e7;">
            <input required type="email" placeholder="Email" style="padding:12px;border-radius:12px;border:1px solid #e7e7e7;">
          </div>
          <div style="margin-top:10px;">
            <textarea required placeholder="What do you need?" rows="6" style="width:100%;padding:12px;border-radius:12px;border:1px solid #e7e7e7;"></textarea>
          </div>
          <div style="margin-top:12px;">
            <button class="btn primary" type="submit">Send</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-row">
      <div>© 2026 Your Company</div>
      <div class="footer-links">
        <a href="privacy.html">Privacy</a>
        <a href="terms.html">Terms</a>
      </div>
    </div>
  </footer>

  <script src="../assets/js/main.js"></script>
</body>
</html>
